train:
  number_of_problems_per_batch: 16
  num_samples_per_problem: 8

  learning_rate: 5e-7
  beta: 0.001
  mu: 2

teacher_model:
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  lora:
    enable: true
    rank: 64
    alpha: 64
  vllm:
    temperature: 1.0
    max_length: 12000
    max_num_seqs: 512
    gpu_memory_utilization: 0.4
    number_of_gpus_per_instance: 1
    max_number_of_instances: -1
    load_and_unload: true
    use_v0: false
    enforce_eager: false

student_model:
  model_name_or_path: neuralmagic/Meta-Llama-3.1-8B-Instruct-FP8
  vllm:
    temperature: 0.6
    max_length: 12000
    max_num_seqs: 512
    gpu_memory_utilization: 0.4
    number_of_gpus_per_instance: 1
    max_number_of_instances: -1
    use_v0: false

    load_and_unload: true

judge_model:
  model_name_or_path: Qwen/Qwen2.5-14B-Instruct-AWQ
  vllm:
    temperature: 0.6
    max_length: 12000
    max_num_seqs: 512
    gpu_memory_utilization: 0.4
    number_of_gpus_per_instance: 1
    max_number_of_instances: -1
    load_and_unload: true
    use_v0: false
    use_awq: true

reward_model:
  model_name_or_path: Answer # If we set this to None we get the -r_sol run.
  reward_type: raw # raw | delta | discrete_raw | discrete_delta | majority_vote (delta, discrete_delta require initial student attempt generations)
  discrete_threshold: 0.5  # Only used for discrete reward types.

huggingface:
  name: <huggingface_name>
  push_to_hub: false

logging:
  wandb: true
  wandb_project: train-rl-Branch_3_LAB
  wandb_run_name: Qwen2.5-7B-Instruct-Lambda0.75_Dynamic_W_UniformShareAcc_Revised
  run_group: 7b
  wandb_tags: ["7b"]
  save_dir: checkpoints/7b_dynamic_w_uniformshareacc_revised
  save_steps: 10


generation:

  number_student_attempts: 4

  # This turns on thinking.
  use_thinking: false
  force_thinking: false

  use_original_judge: false # If we set this to true we get the original judge runs.

  include_next_student_utterance: false # Whether to include the next student utterance in the judge context (for each turn).

  judges_rules_prompts_paths: 
    answer_solution: prompt_templates/judges/answer_solution_integrated.txt
    scaffolding_cognitive_load: prompt_templates/judges/scaffolding_cognitive_load_integrated.txt

  # This turns on the hard lambda.
  extra_penalty_for_rejected_judges: 0.75 # This is the actual lambda we use.

  pre_reject_weight_mode: dynamic

  use_turn_level_aux_rewards: false
  accuracy_share_mode: uniform
  # accuracy_share_discount_gamma: 0.9

  reject_cutoff_enabled: true

  turn_judge_context_turns: 1 # 0 means full context up to current teacher turn

  ignore_rejected_judge: true # If we set this to true we get the soft lambda runs.

  use_experimental_shared_memory: false
  
  # If we turn this on we get the lambda=0.0 run
  # number_judge_attempts: 0
  # judges_rules_prompts_paths: {}

dataset:
  max_train_examples: 2000